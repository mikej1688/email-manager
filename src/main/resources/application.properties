# Application Configuration
spring.application.name=email-manager
server.port=8080

# Graceful shutdown for web requests, but scheduled tasks should stop immediately
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=5s

# Jackson — prevent Hibernate lazy proxy serialization errors
spring.jackson.serialization.fail-on-empty-beans=false

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/emailmanager;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

#spring.jpa.hibernate.ddl-auto=create-drop
# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Scheduler Configuration
spring.task.scheduling.pool.size=5
spring.task.scheduling.shutdown.await-termination=false
spring.task.scheduling.shutdown.await-termination-period=0s

# OpenAI Configuration (Optional - for AI classification)
openai.api.key=${OPENAI_API_KEY:}
openai.enabled=false

# Gmail API Configuration
gmail.client.id=${GMAIL_CLIENT_ID:}
gmail.client.secret=${GMAIL_CLIENT_SECRET:}
gmail.redirect.uri=${GMAIL_REDIRECT_URI:http://localhost:8080/api/oauth/callback}

# Frontend Configuration
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Encryption Configuration
# AES-256-GCM key for encrypting sensitive email columns at rest.
# Must be a Base64-encoded 32-byte (256-bit) key.
# Override with the ENCRYPTION_KEY environment variable in production — never commit a real key.
encryption.key=${ENCRYPTION_KEY:YUJjRGVGZ0hpSmtMbU5vUHFSc1R1Vnd4eVowMTIzNDU=}

# Email Sync Configuration
email.sync.interval.minutes=5
# Page size hint passed to each provider's fetchNewEmails. For Gmail, pagination
# is always used so all messages are fetched; this value is effectively unused.
# For IMAP providers it caps the number of messages fetched per sync cycle.
email.sync.fetch.limit=50

# Logging
logging.level.root=INFO
logging.level.com.emailmanager=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:8080


# JWT Authentication
jwt.secret=${JWT_SECRET:dev-only-secret-change-in-prod}
jwt.expiration-hours=24

# Google user-login OAuth redirect URIs (separate from Gmail account access)
google.auth.redirect-uri=${GOOGLE_AUTH_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
frontend.auth.callback-url=${FRONTEND_URL:http://localhost:3000}/auth/callback

# Jackson: include fields with no @JsonView when a view IS active
# (allows non-annotated fields to always appear; only @JsonView(Full)-annotated
#  encrypted fields are hidden from the DEVELOPER role)
spring.jackson.mapper.default-view-inclusion=true

