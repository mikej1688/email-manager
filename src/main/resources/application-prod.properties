# ============================================================
# Production profile — MySQL
# Activate with: --spring.profiles.active=prod
#
# Required environment variables:
#   DB_HOST        (default: localhost)
#   DB_PORT        (default: 3306)
#   DB_NAME        (default: emailmanager)
#   DB_USERNAME    (default: emailmanager)
#   DB_PASSWORD    (no default — must be set)
#   ENCRYPTION_KEY (32-byte Base64 key — must be set)
#   GMAIL_CLIENT_ID, GMAIL_CLIENT_SECRET, GMAIL_REDIRECT_URI
# ============================================================

# --- DataSource ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:emailmanager}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:emailmanager}
spring.datasource.password=${DB_PASSWORD:}

# --- JPA / Hibernate ---
# ddl-auto=update lets Hibernate add new columns automatically when entities change.
# Tables are created initially by schema-mysql.sql (which uses CREATE TABLE IF NOT EXISTS),
# so Hibernate never needs to issue CREATE TABLE — it only adds missing columns.
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# Required in Spring Boot 2.5+ to make SQL init run BEFORE Hibernate DDL
spring.jpa.defer-datasource-initialization=false

# --- Schema initialisation ---
# Runs schema-mysql.sql on every startup. All statements are CREATE TABLE IF NOT EXISTS
# so they are safe to re-run on an existing database.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql

# --- HikariCP connection pool ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- Disable H2 console ---
spring.h2.console.enabled=false

# --- Logging (less verbose in production) ---
logging.level.com.emailmanager=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=WARN
